<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | PrimeConsult</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- 导航栏（完全一致） -->
        <nav x-data="{ mobileOpen: false }" class="bg-white shadow-md rounded-2xl mt-4 py-3 px-4 md:px-6">
            <div class="flex justify-between items-center">
                <a href="professional_site.html" class="text-2xl font-bold text-slate-800 tracking-tight">PrimeConsult</a>
                <div class="hidden md:flex space-x-6">
                    <a href="professional_site.html" class="text-slate-600 hover:text-indigo-600 transition">Home</a>
                    <a href="services.html" class="text-slate-600 hover:text-indigo-600 transition">Services</a>
                    <a href="contact.html" class="text-slate-600 hover:text-indigo-600 transition">Contact</a>
                </div>
                <button @click="mobileOpen = !mobileOpen" class="md:hidden text-slate-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            <div x-show="mobileOpen" x-cloak class="md:hidden mt-3 pt-2 pb-1 space-y-2">
                <a href="professional_site.html" class="block px-3 py-2 rounded-md text-slate-700 hover:bg-indigo-50">Home</a>
                <a href="services.html" class="block px-3 py-2 rounded-md text-slate-700 hover:bg-indigo-50">Services</a>
                <a href="contact.html" class="block px-3 py-2 rounded-md text-slate-700 hover:bg-indigo-50">Contact</a>
            </div>
        </nav>

        <!-- 联系表单 + 信息 -->
        <div class="my-12 grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-white rounded-2xl shadow-md p-6">
                <h2 class="text-2xl font-bold text-slate-800">Let’s Talk</h2>
                <p class="text-slate-500 mt-1">Fill out the form and we’ll get back to you within 24h.</p>
                <form class="mt-6 space-y-4">
                    <input type="text" placeholder="Full Name" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
                    <input type="email" placeholder="Email Address" class="w-full p-3 border border-gray-300 rounded-lg">
                    <textarea rows="4" placeholder="How can we help?" class="w-full p-3 border border-gray-300 rounded-lg"></textarea>
                    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-full hover:bg-indigo-700 transition">Send Message</button>
                </form>
            </div>
            <div class="bg-indigo-50 rounded-2xl p-6">
                <h2 class="text-2xl font-bold text-slate-800">Reach Out</h2>
                <div class="mt-6 space-y-4">
                    <p class="flex items-center gap-3"><span class="text-2xl">📍</span> 123 Consulting Ave, Suite 400, New York, NY</p>
                    <p class="flex items-center gap-3"><span class="text-2xl">📞</span> +1 (212) 555-7890</p>
                    <p class="flex items-center gap-3"><span class="text-2xl">✉️</span> hello@primeconsult.com</p>
                </div>
                <div class="mt-8">
                    <h3 class="font-semibold">Follow us</h3>
                    <div class="flex gap-4 mt-2 text-2xl">🐦 📘 📸</div>
                </div>
            </div>
        </div>

        <footer class="border-t border-gray-200 py-6 text-center text-slate-500 text-sm mt-8">
            &copy; 2026 PrimeConsult. All rights reserved.
        </footer>
    </div>
    <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
